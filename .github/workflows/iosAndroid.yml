on:
  push:
    tags:
      - "android-v*"
name: "Android Build & Release"

permissions:
  contents: write

jobs:
  build:
    name: Android Build & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          architecture: x64

      - run: flutter build apk --release --split-per-abi
      # iOS release builds are intentionally disabled for now.
      # Unsigned IPA files are not installable on standard iPhones; re-enable
      # this only after adding Apple signing certificates/provisioning profiles.
      #
      # - run: |
      #     flutter build ios --release --no-codesign
      #     cd build/ios/iphoneos
      #     mkdir Payload
      #     cd Payload
      #     ln -s ../Runner.app
      #     cd ..
      #     zip -r app.ipa Payload
      - name: Push to Releases
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/apk/release/*"
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
