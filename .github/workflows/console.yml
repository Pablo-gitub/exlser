name: "Desktop Build & Release"

on:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install Linux Dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y ninja-build libgtk-3-dev
      - name: Install project dependencies
        run: flutter pub get
        working-directory: flutter_app
      - name: Build Linux
        run: flutter build linux --release
        working-directory: flutter_app
      - name: Archive Linux Build
        run: zip -r linux-build.zip build/linux/x64/release/bundle/
        working-directory: flutter_app
      - name: Upload Linux Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: flutter_app/linux-build.zip

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install project dependencies
        run: flutter pub get
        working-directory: flutter_app
      - name: Build Windows
        run: flutter build windows --release
        working-directory: flutter_app
      - name: Archive Windows Build
        run: Compress-Archive -Path build/windows/x64/runner/Release -DestinationPath windows-build.zip
        working-directory: flutter_app
      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: flutter_app/windows-build.zip

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install project dependencies
        run: flutter pub get
        working-directory: flutter_app
      - name: Build macOS
        run: flutter build macos --release
        working-directory: flutter_app
      - name: Archive macOS Build
        run: zip -r macos-build.zip build/macos/Build/Products/Release/
        working-directory: flutter_app
      - name: Upload macOS Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: flutter_app/macos-build.zip

  release:
    name: Release Desktop Artifacts
    runs-on: ubuntu-latest
    needs: [build-linux, build-windows, build-macos]
    steps:
      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./builds/
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./builds/
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./builds/
      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            ./builds/linux-build.zip
            ./builds/windows-build.zip
            ./builds/macos-build.zip
          tag: ${{ github.ref_name }}
          token: ${{ secrets.GITHUB_TOKEN }}
